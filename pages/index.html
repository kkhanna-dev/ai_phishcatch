<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishCatch — AI Email Phishing Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3048;
      --accent: #6366f1;
      --accent-dim: #4f51c8;
      --text: #e2e4f0;
      --muted: #8b90b4;
      --safe: #10b981;
      --suspicious: #f59e0b;
      --dangerous: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
    }

    header .logo { font-size: 1.5rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }

    .badge {
      margin-left: auto;
      font-size: 0.7rem;
      background: var(--accent);
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-weight: 600;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .panel-body { padding: 1.25rem; flex: 1; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
      margin-top: 0.9rem;
    }
    label:first-child { margin-top: 0; }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 120px; }

    .url-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .url-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      color: var(--muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #url-input-row {
      display: flex;
      gap: 0.5rem;
    }
    #url-input-row input { flex: 1; }
    #add-url-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      border-radius: 8px;
      padding: 0 0.8rem;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }
    #add-url-btn:hover { background: var(--accent); }

    .scan-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .scan-btn:hover:not(:disabled) { background: var(--accent-dim); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Chat / results panel */
    #chat {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      flex: 1;
    }

    .msg {
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .msg-user {
      background: var(--bg);
      border: 1px solid var(--border);
      align-self: flex-end;
      max-width: 85%;
    }

    .msg-ai {
      background: var(--bg);
      border: 1px solid var(--border);
      align-self: flex-start;
      width: 100%;
    }

    .msg-thinking {
      color: var(--muted);
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .verdict-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      margin-bottom: 0.5rem;
    }
    .verdict-SAFE { background: rgba(16,185,129,.15); color: var(--safe); }
    .verdict-SUSPICIOUS { background: rgba(245,158,11,.15); color: var(--suspicious); }
    .verdict-DANGEROUS { background: rgba(239,68,68,.15); color: var(--dangerous); }

    .score-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .score-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .summary-text { font-size: 0.875rem; color: var(--text); }

    .indicators { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.4rem; }

    .indicator {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.8rem;
      background: rgba(255,255,255,.03);
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
    }

    .sev-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .sev-high { background: var(--dangerous); }
    .sev-medium { background: var(--suspicious); }
    .sev-low { background: var(--safe); }

    .recommendations {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .recommendations li { margin-left: 1.1rem; margin-top: 0.3rem; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      color: var(--muted);
      text-align: center;
      gap: 0.5rem;
    }
    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.85rem; }

    .history-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .history-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }

    .history-score {
      font-weight: 800;
      font-size: 0.9rem;
      width: 30px;
      text-align: center;
      flex-shrink: 0;
    }

    .history-meta { overflow: hidden; }
    .history-subject {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-sub { color: var(--muted); margin-top: 1px; }

    .history-verdict {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 1.25rem; }
    .tab-content.active { display: flex; flex-direction: column; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }
    .stat-num { font-size: 1.6rem; font-weight: 800; }
    .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🛡️</span>
  <div>
    <h1>PhishCatch</h1>
    <p>AI email phishing detection</p>
  </div>
  <span class="badge">Powered by Llama 3.3 · Cloudflare Workers AI</span>
</header>

<main>
  <!-- Input panel -->
  <div class="panel">
    <div class="panel-header">Analyze Email</div>
    <div class="panel-body">
      <label for="subject">Subject</label>
      <input id="subject" type="text" placeholder="Email subject line..." />

      <label for="sender">Sender</label>
      <input id="sender" type="text" placeholder="sender@example.com" />

      <label for="body">Email Body</label>
      <textarea id="body" placeholder="Paste the email content here..."></textarea>

      <label>Links in Email</label>
      <div id="url-input-row">
        <input id="url-input" type="url" placeholder="https://..." />
        <button id="add-url-btn" title="Add link">+</button>
      </div>
      <div id="url-tags" class="url-tags"></div>

      <button class="scan-btn" id="scan-btn" onclick="analyze()">
        Scan for Phishing
      </button>
    </div>
  </div>

  <!-- Results panel -->
  <div class="panel" style="display:flex;flex-direction:column;">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('results')">Results</div>
      <div class="tab" onclick="switchTab('history')">History</div>
    </div>

    <div class="tab-content active" id="tab-results">
      <div id="chat">
        <div class="empty-state">
          <span class="icon">🔍</span>
          <p>Paste an email and click <strong>Scan for Phishing</strong> to analyze it.</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-history">
      <div id="history-content">
        <div class="empty-state">
          <span class="icon">📋</span>
          <p>No scans yet. History is stored in Cloudflare Durable Objects.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  // ---- Config ----
  // Point to your deployed Cloudflare Worker URL.
  // Locally: wrangler dev runs on http://localhost:8787
  const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:8787"
    : "REPLACE_WITH_YOUR_WORKER_URL";

  // ---- State ----
  const links = [];

  // ---- URL tag management ----
  document.getElementById("url-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); addUrl(); }
  });
  document.getElementById("add-url-btn").addEventListener("click", addUrl);

  function addUrl() {
    const input = document.getElementById("url-input");
    const val = input.value.trim();
    if (val && !links.includes(val)) {
      links.push(val);
      renderTags();
    }
    input.value = "";
  }

  function removeUrl(i) {
    links.splice(i, 1);
    renderTags();
  }

  function renderTags() {
    const container = document.getElementById("url-tags");
    container.innerHTML = links.map((u, i) =>
      `<span class="url-tag" title="${u}">${u} <span onclick="removeUrl(${i})" style="cursor:pointer;opacity:.6">✕</span></span>`
    ).join("");
  }

  // ---- Tab switching ----
  function switchTab(name) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", i === (name === "results" ? 0 : 1));
    });
    document.getElementById("tab-results").classList.toggle("active", name === "results");
    document.getElementById("tab-history").classList.toggle("active", name === "history");
    if (name === "history") loadHistory();
  }

  // ---- Analyze ----
  async function analyze() {
    const subject = document.getElementById("subject").value.trim();
    const sender = document.getElementById("sender").value.trim();
    const body = document.getElementById("body").value.trim();

    if (!subject && !body) {
      alert("Please enter at least a subject or email body.");
      return;
    }

    const btn = document.getElementById("scan-btn");
    btn.disabled = true;
    btn.textContent = "Scanning…";

    const chat = document.getElementById("chat");

    // User bubble
    const userBubble = document.createElement("div");
    userBubble.className = "msg msg-user";
    userBubble.textContent = subject
      ? `Subject: "${subject}"${sender ? `\nFrom: ${sender}` : ""}`
      : `(No subject)${sender ? `\nFrom: ${sender}` : ""}`;
    chat.innerHTML = "";
    chat.appendChild(userBubble);

    // Thinking bubble
    const thinking = document.createElement("div");
    thinking.className = "msg msg-ai msg-thinking";
    thinking.innerHTML = `<div class="spinner"></div><span>Analyzing with Llama 3.3 on Cloudflare Workers AI…</span>`;
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch(`${API_URL}/api/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ subject, sender, body, links }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `API error ${res.status}`);
      }

      const result = await res.json();
      thinking.remove();
      chat.appendChild(buildResultBubble(result));
    } catch (err) {
      thinking.remove();
      const errBubble = document.createElement("div");
      errBubble.className = "msg msg-ai";
      errBubble.innerHTML = `<span style="color:var(--dangerous)">⚠ Error: ${escapeHtml(err.message)}</span>`;
      chat.appendChild(errBubble);
    } finally {
      btn.disabled = false;
      btn.textContent = "Scan for Phishing";
      chat.scrollTop = chat.scrollHeight;
    }
  }

  function buildResultBubble(r) {
    const scoreColor = r.score <= 30 ? "var(--safe)" : r.score <= 65 ? "var(--suspicious)" : "var(--dangerous)";
    const indicatorsHtml = (r.indicators || []).map(ind => `
      <div class="indicator">
        <span class="sev-dot sev-${ind.severity}"></span>
        <span><strong>${escapeHtml(ind.type)}</strong> — ${escapeHtml(ind.detail)}</span>
      </div>
    `).join("");

    const recsHtml = (r.recommendations || []).map(rec => `<li>${escapeHtml(rec)}</li>`).join("");

    const div = document.createElement("div");
    div.className = "msg msg-ai";
    div.innerHTML = `
      <span class="verdict-badge verdict-${r.verdict}">${r.verdict}</span>
      <div class="score-row">
        <div class="score-ring" style="background:${scoreColor}22;color:${scoreColor};border:2px solid ${scoreColor}">${r.score}</div>
        <p class="summary-text">${escapeHtml(r.summary)}</p>
      </div>
      ${indicatorsHtml ? `<div class="indicators">${indicatorsHtml}</div>` : ""}
      ${recsHtml ? `<ul class="recommendations">${recsHtml}</ul>` : ""}
      ${r.cached ? `<p style="font-size:.7rem;color:var(--muted);margin-top:.5rem">Cached result</p>` : ""}
    `;
    return div;
  }

  // ---- History ----
  async function loadHistory() {
    const container = document.getElementById("history-content");
    container.innerHTML = `<div class="msg-thinking" style="padding:.5rem 0"><div class="spinner"></div><span>Loading history…</span></div>`;

    try {
      const [histRes, statsRes] = await Promise.all([
        fetch(`${API_URL}/api/history?limit=50`),
        fetch(`${API_URL}/api/stats`),
      ]);

      const history = histRes.ok ? await histRes.json() : [];
      const stats = statsRes.ok ? await statsRes.json() : null;

      if (!history.length) {
        container.innerHTML = `<div class="empty-state"><span class="icon">📋</span><p>No scans recorded yet.</p></div>`;
        return;
      }

      const statsHtml = stats ? `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num">${stats.total}</div><div class="stat-label">Total Scans</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--safe)">${stats.safe}</div><div class="stat-label">Safe</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--suspicious)">${stats.suspicious}</div><div class="stat-label">Suspicious</div></div>
          <div class="stat-card"><div class="stat-num" style="color:var(--dangerous)">${stats.dangerous}</div><div class="stat-label">Dangerous</div></div>
        </div>
      ` : "";

      const itemsHtml = history.map(entry => {
        const color = entry.score <= 30 ? "var(--safe)" : entry.score <= 65 ? "var(--suspicious)" : "var(--dangerous)";
        const time = new Date(entry.timestamp).toLocaleString();
        return `
          <div class="history-item" onclick="showHistoryDetail(${escapeHtml(JSON.stringify(entry))})">
            <span class="history-score" style="color:${color}">${entry.score}</span>
            <div class="history-meta">
              <div class="history-subject">${escapeHtml(entry.subject || "(no subject)")}</div>
              <div class="history-sub">${escapeHtml(entry.sender || "Unknown sender")} · ${time}</div>
            </div>
            <span class="history-verdict verdict-${entry.verdict}">${entry.verdict}</span>
          </div>
        `;
      }).join("");

      container.innerHTML = `${statsHtml}<div class="history-list">${itemsHtml}</div>`;
    } catch (err) {
      container.innerHTML = `<p style="color:var(--dangerous);font-size:.85rem">Failed to load history: ${escapeHtml(err.message)}</p>`;
    }
  }

  function showHistoryDetail(entry) {
    switchTab("results");
    const chat = document.getElementById("chat");
    const userBubble = document.createElement("div");
    userBubble.className = "msg msg-user";
    userBubble.textContent = `Subject: "${entry.subject}"\nFrom: ${entry.sender}`;
    chat.innerHTML = "";
    chat.appendChild(userBubble);
    chat.appendChild(buildResultBubble(entry));
    chat.scrollTop = chat.scrollHeight;
  }

  function escapeHtml(str) {
    if (typeof str !== "string") str = String(str ?? "");
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
